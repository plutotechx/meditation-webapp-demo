<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Update Daily Meditation</title>
  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.12);
      --text:#eaf0ff; --muted:rgba(234,240,255,.75); --input:rgba(0,0,0,.22);
      --btn:#6aa9ff; --btnText:#081122; --danger:#ff6a6a; --ok:#65ffb3; --radius:18px;

      --overlay: rgba(0,0,0,.55);
      --card-bg: rgba(40,52,62,.35);
      --card-border: rgba(255,255,255,.28);
      --green: #21b14b;

      --tint-ok: rgba(101,255,179,.16);
      --tint-bad: rgba(255,106,106,.16);
      --tint-border-ok: rgba(101,255,179,.34);
      --tint-border-bad: rgba(255,106,106,.34);
    }

    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      margin:0;background:var(--bg);color:var(--text)
    }
    .wrap{max-width:820px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}

    .headerCenter{text-align:center;display:grid;gap:6px;margin-bottom:16px;}
    h1{margin:0;font-size:22px}
    .muted{color:var(--muted);margin:0;line-height:1.55}
    #weekHeader{margin:0;color:rgba(234,240,255,.78);font-weight:800;}

    label{display:block;margin:12px 0 6px}
    select,input{
      width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.18);
      background:var(--input);color:#fff;padding:12px 12px;outline:none
    }
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){ .grid{grid-template-columns:1fr 1fr} }

    button{
      margin-top:14px;width:100%;padding:12px 14px;border:0;border-radius:14px;
      background:var(--btn);color:var(--btnText);font-weight:800;cursor:pointer
    }
    button:disabled{opacity:.6;cursor:not-allowed}

    .msg{margin-top:12px;min-height:22px;white-space:pre-line}
    .msg.ok{color:var(--ok)}
    .msg.bad{color:var(--danger)}

    .small{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
    a.linkbtn{display:block;text-decoration:none}
    a.linkbtn button{margin-top:10px;background:rgba(255,255,255,.10);color:var(--text);border:1px solid rgba(255,255,255,.14)}

    /* ===== STATUS BAR ===== */
    #statusBar{
      margin: 10px 0 4px;
      overflow: hidden;
      transition: max-height .3s ease, opacity .3s ease;
      max-height: 0;
      opacity: 0;
    }
    #statusBar.visible{
      max-height: 160px;
      opacity: 1;
    }

    .status-boxes{
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px;
      padding: 4px 0 8px;
    }
    @media(max-width:500px){
      .status-boxes{ grid-template-columns: repeat(2,1fr); }
    }

    .sbox{
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      min-height: 80px;
    }
    .sbox.ok{
      background: linear-gradient(180deg, var(--tint-ok), rgba(0,0,0,.14));
      border-color: var(--tint-border-ok);
    }
    .sbox.bad{
      background: linear-gradient(180deg, var(--tint-bad), rgba(0,0,0,.14));
      border-color: var(--tint-border-bad);
    }
    .sbox.loading{
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
    }
    .sbox-title{font-size:12px;font-weight:800;color:rgba(234,240,255,.85);letter-spacing:.2px;}
    .sbox-icon{font-size:20px;line-height:1;}
    .sbox-time{font-size:11px;font-weight:700;color:rgba(234,240,255,.6);}

    .sbox-sum-count{font-size:26px;font-weight:1000;line-height:1;color:rgba(234,240,255,.95);}
    .sbox-sum-count.all{color:var(--ok);}
    .sbox-sum-count.none{color:var(--danger);}
    .sbox-sum-label{font-size:11px;font-weight:700;color:rgba(234,240,255,.6);}

    /* skeleton shimmer */
    .shimmer{
      width:100%;height:12px;border-radius:6px;
      background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.06) 75%);
      background-size:200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer{
      0%{background-position:200% 0}
      100%{background-position:-200% 0}
    }

    /* ===== Success Popup ===== */
    .success-overlay{position:fixed;inset:0;display:none;place-items:center;background:var(--overlay);z-index:9999;}
    .success-overlay.is-open{display:grid;animation:overlayIn .18s ease-out forwards;}
    @keyframes overlayIn{from{opacity:0}to{opacity:1}}

    .success-card{
      width:min(520px,86vw);height:min(280px,46vh);border-radius:10px;
      background:linear-gradient(180deg,rgba(54,74,86,.35),rgba(25,33,41,.40));
      border:1px solid var(--card-border);
      box-shadow:0 18px 55px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.05);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      position:relative;overflow:hidden;
      display:grid;place-items:center;padding:24px;
      transform:translateY(6px) scale(.985);opacity:0;
      animation:cardIn .22s ease-out forwards;
    }
    @keyframes cardIn{to{transform:translateY(0) scale(1);opacity:1;}}
    .success-card::before{content:"";position:absolute;top:-10px;right:80px;width:170px;height:18px;background:radial-gradient(closest-side,rgba(135,200,255,.95),rgba(135,200,255,.25) 55%,rgba(135,200,255,0) 75%);filter:blur(1.2px);opacity:.9;pointer-events:none;}
    .success-card::after{content:"";position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:210px;height:20px;background:radial-gradient(closest-side,rgba(135,200,255,.85),rgba(135,200,255,.25) 55%,rgba(135,200,255,0) 78%);filter:blur(1.4px);opacity:.85;pointer-events:none;}
    .success-content{text-align:center;display:grid;gap:18px;justify-items:center;transform:translateY(-4px);}
    .success-icon{width:86px;height:86px;border-radius:999px;background:var(--green);display:grid;place-items:center;box-shadow:0 14px 30px rgba(33,177,75,.25);}
    .success-text{font-size:clamp(22px,2.6vw,30px);font-weight:600;color:var(--text);letter-spacing:.2px;text-shadow:0 2px 18px rgba(0,0,0,.45);margin:0;}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="headerCenter">
        <h1>Update Daily Meditation</h1>
        <p class="muted">บันทึกข้อมูลการทำสมาธิ</p>
        <p class="muted" id="weekHeader">กำลังคำนวณช่วงสัปดาห์...</p>
      </div>

      <form id="f">
        <label>ชื่อ - ชื่อเล่น</label>
        <select name="name" id="nameSel" required>
          <option value="">— เลือกชื่อ —</option>
          <option>สุรเชษฐ์ (ตั้ม)</option>
          <option>บัญญัติ (แดง)</option>
          <option>รัชเศรษฐ์ (ยศ)</option>
          <option>ชนุดม (ดอน)</option>
          <option>ทรงชัย (ทรง)</option>
          <option>สุรุ่งรัตน์ (เก่ง)</option>
          <option>อติพร (โอ)</option>
          <option>เกสณี (เก๋)</option>
          <option>สมภพ (เอก)</option>
          <option>ฐิตภรณ์ (เบลล์)</option>
          <option>อุมาพร (นก)</option>
          <option>ณัฐพล (ท๊อด)</option>
          <option>กิตติพงษ์ (พี)</option>
          <option>ธนพร (พร)</option>
          <option>รายาวดี (เฟริน)</option>
          <option>บัญญัติ (บอย)</option>
          <option>ธีรพล (ต้อม)</option>
          <option>นริศ (เอ็กซ์)</option>
          <option>กิตติ (ตี๋)</option>
          <option>จารุวรรณ (จุ๋ม)</option>
          <option>ณัฏฐา (เมย์)</option>
          <option>วรินทร (ต่อ)</option>
          <option>กิตติศักดิ์ (ใหม่)</option>
          <option>ราชัย (ชัย)</option>
          <option>รัญชนา (จีน่า)</option>
          <option>อรวรา (ผักแพว)</option>
          <option>วรรณชัย (ดิว)</option>
          <option>ธนกฤษ (พิว)</option>
          <option>บุญฤทธิ์ (ใหม่)</option>
          <option>จิรายุทธ (ลีโอ)</option>
          <option>นนทชา (วิว)</option>
          <option>ยิ่งลักษณ์ (กุ้ง)</option>
          <option>พรชนัน (มาร์ค)</option>
          <option>ศราวุฒิ (บอล)</option>
          <option>นันทพงศ์ (โบ๊ท)</option>
          <option>ณัฐวุฒิ (เฟียส)</option>
          <option>กฤษดา (โจ)</option>
          <option>รณฤทธิ์ (เม่น)</option>
          <option>ธีรศักดิ์ (ต่าย)</option>
          <option>ณภัทร (ตัน)</option>
          <option>เอกพจน์ (เอก)</option>
        </select>

        <!-- ===== STATUS BAR ===== -->
        <div id="statusBar">
          <div class="status-boxes" id="statusBoxes"></div>
        </div>

        <div class="grid">
          <div>
            <label>วันที่บันทึก</label>
            <select id="logDate" name="logDate" required></select>
            <input type="hidden" id="weekdayHidden" name="weekday" value="">
          </div>

          <div>
            <label>ช่วงเวลา การทำสมาธิ</label>
            <select name="session" required>
              <option value="">— เลือกช่วง —</option>
              <option>ครั้งที่ 1 / ตื่นนอน-เช้า</option>
              <option>ครั้งที่ 2 / ระหว่างวัน</option>
              <option>ครั้งที่ 3 / ก่อนนอน-ค่ำ</option>
            </select>
          </div>
        </div>

        <label>ระยะเวลาในการทำสมาธิ(แต่ละครั้ง)</label>
        <select name="duration" required>
          <option value="">— เลือกระยะเวลา —</option>
          <option>3-5 นาที</option>
          <option>10 นาที</option>
        </select>

        <button id="btn" type="submit">บันทึกข้อมูล</button>

        <a class="linkbtn" href="/status.html">
          <button type="button">ตรวจสอบสถานะการทำสมาธิ</button>
        </a>

        <div class="msg" id="msg"></div>
        <div class="small">หมายเหตุ: ตรวจสอบข้อมูลก่อนกดบันทึกข้อมูล</div>
      </form>
    </div>
  </div>

  <!-- ===== Success Popup ===== -->
  <div id="successOverlay" class="success-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="success-card">
      <div class="success-content">
        <div class="success-icon" aria-hidden="true">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M20 7L10.5 16.5L4 10" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p id="successText" class="success-text">บันทึกข้อมูลเรียบร้อย</p>
      </div>
    </div>
  </div>

<script>
  const weekHeaderEl = document.getElementById("weekHeader");
  function pad2(n){ return String(n).padStart(2,"0"); }
  function toISODateLocal(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function thaiDateLabelLocal(d){
    return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});
  }
  function mondayOfWeekLocal(d){
    const x = new Date(d); x.setHours(0,0,0,0);
    const day = x.getDay();
    const diff = (day===0)?-6:(1-day);
    x.setDate(x.getDate()+diff);
    return x;
  }
  function sundayOfWeekFromMonday(mon){
    const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(0,0,0,0); return sun;
  }

  (function showWeekHeader(){
    const now=new Date(), mon=mondayOfWeekLocal(now), sun=sundayOfWeekFromMonday(mon);
    weekHeaderEl.textContent=`จันทร์ ${thaiDateLabelLocal(mon)} – อาทิตย์ ${thaiDateLabelLocal(sun)}`;
  })();

  const logDateEl      = document.getElementById("logDate");
  const weekdayHiddenEl= document.getElementById("weekdayHidden");
  const TH_DOW         = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];

  function buildLogDateOptions7DaysNoPast(){
    const now=new Date(), todayISO=toISODateLocal(now), monThis=mondayOfWeekLocal(now);
    const days=[];
    for(let i=0;i<7;i++){const d=new Date(monThis);d.setDate(monThis.getDate()+i);d.setHours(0,0,0,0);days.push(d);}
    logDateEl.innerHTML="";
    for(const d of days){
      const iso=toISODateLocal(d), dow=TH_DOW[d.getDay()];
      const base=`${dow} ${thaiDateLabelLocal(d)}`;
      const label=(iso===todayISO)?`${base} (วันนี้)`:base;
      const opt=document.createElement("option");
      opt.value=iso; opt.textContent=label; opt.dataset.dow=dow;
      if(iso<todayISO){opt.disabled=true;opt.textContent=`${label} (ผ่านมาแล้ว)`;}
      else if(iso>todayISO){opt.disabled=true;opt.textContent=`${label} (ยังมาไม่ถึง)`;}
      logDateEl.appendChild(opt);
    }
    if([...logDateEl.options].some(o=>o.value===todayISO)) logDateEl.value=todayISO;
    else for(let i=0;i<logDateEl.options.length;i++){if(!logDateEl.options[i].disabled){logDateEl.selectedIndex=i;break;}}
    weekdayHiddenEl.value=logDateEl.selectedOptions[0]?.dataset?.dow||"";
  }
  logDateEl.addEventListener("change",()=>{
    weekdayHiddenEl.value=logDateEl.selectedOptions[0]?.dataset?.dow||"";
  });
  buildLogDateOptions7DaysNoPast();

  // =========================
  // STATUS BAR
  // =========================
  const statusBar   = document.getElementById("statusBar");
  const statusBoxes = document.getElementById("statusBoxes");
  const nameSel     = document.getElementById("nameSel");

  let statusAbort = null;
  let statusCache = {};

  function getTodayISO(){ return toISODateLocal(new Date()); }

  function showStatusLoading(){
    statusBar.classList.add("visible");
    statusBoxes.innerHTML = `
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
    `;
  }

  function showStatusResult(data){
    const s1 = data.sessions?.s1 || {};
    const s2 = data.sessions?.s2 || {};
    const s3 = data.sessions?.s3 || {};
    const done = [s1.done, s2.done, s3.done].filter(Boolean).length;

    function box(title, st){
      const cls  = st.done ? "ok" : "bad";
      const icon = st.done
        ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 7L10.5 16.5L4 10" stroke="#65ffb3" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#ff6a6a" stroke-width="2.8" stroke-linecap="round"/></svg>`;
      const timeStr = (st.time && st.time !== "—") ? `<div class="sbox-time">${st.time} น.</div>` : `<div class="sbox-time">—</div>`;
      return `<div class="sbox ${cls}"><div class="sbox-title">${title}</div>${icon}${timeStr}</div>`;
    }

    const sumCls = done===3 ? "all" : done===0 ? "none" : "";
    const sumBox = `
      <div class="sbox">
        <div class="sbox-title">สรุป</div>
        <div class="sbox-sum-count ${sumCls}">${done}/3</div>
        <div class="sbox-sum-label">${done===3?"ครบแล้ว!":done===0?"ยังไม่มี":"กำลังดี"}</div>
      </div>`;

    statusBoxes.innerHTML = box("ครั้งที่ 1",s1) + box("ครั้งที่ 2",s2) + box("ครั้งที่ 3",s3) + sumBox;
    statusBar.classList.add("visible");
  }

  function showStatusError(){
    statusBar.classList.add("visible");
    statusBoxes.innerHTML = `<div style="grid-column:1/-1;text-align:center;font-size:12px;color:rgba(234,240,255,.45);padding:8px 0;">ไม่สามารถโหลดสถานะได้</div>`;
  }

  function hideStatus(){
    statusBar.classList.remove("visible");
    statusBoxes.innerHTML = "";
  }

  async function fetchStatus(name, logDate){
    const cacheKey = name + "|" + logDate;
    if(statusCache[cacheKey]){
      showStatusResult(statusCache[cacheKey]);
      return;
    }
    if(statusAbort) statusAbort.abort();
    statusAbort = new AbortController();
    showStatusLoading();
    try {
      const q   = new URLSearchParams({ name, logDate });
      const res = await fetch(`/api/checkStatus?${q}`, { signal: statusAbort.signal });
      const out = await res.json().catch(()=>({}));
      if(out.ok !== false){
        statusCache[cacheKey] = out;
        showStatusResult(out);
      } else {
        showStatusError();
      }
    } catch(e){
      if(e.name === "AbortError") return;
      showStatusError();
    }
  }

  nameSel.addEventListener("change", () => {
    const name    = (nameSel.value||"").trim();
    const logDate = getTodayISO();
    if(!name){ hideStatus(); return; }
    fetchStatus(name, logDate);
  });

  // =========================
  // Success Popup
  // =========================
  (function(){
    const overlay=document.getElementById("successOverlay");
    const textEl =document.getElementById("successText");
    let autoTimer=null;
    const POPUP_MS=2500, REFRESH_AFTER_MS=4500;
    window.showSuccessPopup=function(message="บันทึกข้อมูลเรียบร้อย",autoCloseMs=POPUP_MS){
      textEl.textContent=message;
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden","false");
      clearTimeout(autoTimer);
      autoTimer=setTimeout(window.hideSuccessPopup,autoCloseMs);
    };
    window.hideSuccessPopup=function(){
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden","true");
    };
    document.addEventListener("keydown",(e)=>{if(e.key==="Escape")window.hideSuccessPopup();});
    window.__POPUP_MS__=POPUP_MS;
    window.__REFRESH_AFTER_MS__=REFRESH_AFTER_MS;
  })();

  // =========================
  // SUBMIT
  // =========================
  const form = document.getElementById("f");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    btn.disabled=true;
    msg.className="msg";
    msg.textContent="กำลังบันทึกข้อมูล...";

    const fd=new FormData(form);
    const payload=Object.fromEntries(fd.entries());
    payload.clientNow=new Date().toISOString();
    payload.tzOffsetMin=new Date().getTimezoneOffset();

    try {
      const res=await fetch("/api/submit",{
        method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)
      });
      const out=await res.json().catch(()=>({}));
      if(res.ok&&out.ok){
        msg.className="msg ok";
        msg.textContent="บันทึกข้อมูลเรียบร้อย ✅";
        window.showSuccessPopup("บันทึกข้อมูลเรียบร้อย");
        const selName=(nameSel.value||"").trim();
        const cKey=selName+"|"+getTodayISO();
        delete statusCache[cKey];
        form.reset();
        buildLogDateOptions7DaysNoPast();
        hideStatus();
        setTimeout(()=>location.reload(),window.__REFRESH_AFTER_MS__||4500);
      } else {
        msg.className="msg bad";
        msg.textContent="บันทึกไม่สำเร็จ ❌ "+(out.error||"unknown_error");
      }
    } catch(e){
      msg.className="msg bad";
      msg.textContent="บันทึกไม่สำเร็จ ❌ "+e;
    } finally {
      btn.disabled=false;
    }
  });
</script>
</body>
</html>
