<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Update Daily Meditation</title>
  <!-- UpdatedAt: 2026-03-10 21:10 (+07:00) -->
  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.12);
      --text:#eaf0ff; --muted:rgba(234,240,255,.75); --input:rgba(0,0,0,.22);
      --btn:#6aa9ff; --btnText:#081122; --danger:#ff6a6a; --ok:#65ffb3; --radius:18px;

      --overlay: rgba(0,0,0,.72);
      --card-border: rgba(255,255,255,.28);
      --green: #21b14b;
    }

    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
      margin:0;background:var(--bg);color:var(--text)
    }
    .wrap{max-width:820px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}

    .headerCenter{
      text-align:center;
      display:grid;
      gap:6px;
      margin-bottom:16px;
    }
    h1{margin:0;font-size:22px}
    .muted{color:var(--muted);margin:0;line-height:1.55}
    #weekHeader{
      margin:0;
      color:rgba(234,240,255,.78);
      font-weight:800;
    }

    label{display:block;margin:12px 0 6px}
    select,input{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      background:var(--input);
      color:#fff;
      padding:12px 12px;
      outline:none
    }
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){ .grid{grid-template-columns:1fr 1fr} }

    button{
      margin-top:14px;width:100%;
      padding:12px 14px;border:0;border-radius:14px;
      background:var(--btn);color:var(--btnText);
      font-weight:800;cursor:pointer
    }
    button:disabled{opacity:.6;cursor:not-allowed}

    .msg{margin-top:12px;min-height:22px;white-space:pre-line}
    .msg.ok{color:var(--ok)}
    .msg.bad{color:var(--danger)}

    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:10px;
      text-align:center;
    }

    a.linkbtn{display:block;text-decoration:none}
    a.linkbtn button{
      margin-top:10px;
      background:rgba(255,255,255,.10);
      color:var(--text);
      border:1px solid rgba(255,255,255,.14)
    }

    /* ===== Success Popup ===== */
    .success-overlay{
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: var(--overlay);
      z-index: 9999;
    }
    .success-overlay.is-open{
      display: grid;
      animation: overlayIn .18s ease-out forwards;
    }
    @keyframes overlayIn{
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .success-card{
      width: min(640px, 92vw);
      border-radius: 14px;
      background: linear-gradient(180deg,
        rgba(54, 74, 86, .58),
        rgba(25, 33, 41, .62)
      );
      border: 1px solid var(--card-border);
      box-shadow:
        0 18px 55px rgba(0,0,0,.55),
        inset 0 0 0 1px rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 22px 18px 18px;
      transform: translateY(6px) scale(.985);
      opacity: 0;
      animation: cardIn .22s ease-out forwards;
    }
    @keyframes cardIn{
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .success-close{
      position:absolute;
      top:12px;
      right:12px;
      width:46px;height:46px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.92);
      color:#ff2f2f;
      display:grid;place-items:center;
      cursor:pointer;
      box-shadow:0 12px 26px rgba(0,0,0,.28);
      font-size:24px;
      font-weight:1000;
      line-height:1;
    }
    .success-close:hover{ background:rgba(255,255,255,.98); }
    .success-close:active{ transform:scale(.98); }

    .success-content{
      text-align: center;
      display: grid;
      gap: 14px;
      justify-items: center;
      width: 100%;
    }

    .success-icon{
      width: 86px;
      height: 86px;
      border-radius: 999px;
      background: var(--green);
      display: grid;
      place-items: center;
      box-shadow: 0 14px 30px rgba(33,177,75,.25);
    }

    .success-text{
      font-size: clamp(22px, 2.6vw, 30px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: .2px;
      text-shadow: 0 2px 18px rgba(0,0,0,.45);
      margin: 0;
    }

    /* ===== After-save status boxes ===== */
    .afterSaveGrid{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-top: 6px;
    }
    @media (max-width: 520px){ .afterSaveGrid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }

    .sbox{
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      padding: 12px 12px 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .sboxTop{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; font-weight: 900; color: rgba(234,240,255,.92);
    }
    .sicon{
      width: 30px; height: 30px;
      border-radius: 999px;
      display:grid; place-items:center;
      font-weight: 1000;
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.92);
    }

    .sboxMark{
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      height:72px;
    }
    .mark{
      width:54px;height:54px;
      border-radius:999px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.20);
      background:rgba(0,0,0,.18);
    }
    .mark.ok{
      background:rgba(33,177,75,.20);
      border-color:rgba(33,177,75,.55);
      box-shadow:0 12px 24px rgba(33,177,75,.18);
    }
    .mark.no{
      background:rgba(255,106,106,.16);
      border-color:rgba(255,106,106,.50);
      box-shadow:0 12px 24px rgba(255,106,106,.10);
    }
    .mark svg{display:block}

    .sbox.ok{
      background: linear-gradient(180deg, rgba(33,177,75,.22), rgba(0,0,0,.20));
      border-color: rgba(33,177,75,.35);
    }
    .sbox.no{
      background: linear-gradient(180deg, rgba(255,106,106,.14), rgba(0,0,0,.20));
      border-color: rgba(255,106,106,.28);
    }
    .sbox.summary{ background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.18)); }
    .sboxSum{
      margin-top: 14px;
      font-size: 42px;
      font-weight: 950;
      text-align: center;
      color: rgba(234,240,255,.96);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="headerCenter">
        <h1>Update Daily Meditation</h1>
        <p class="muted">บันทึกข้อมูลการทำสมาธิ</p>
        <p class="muted" id="weekHeader">กำลังคำนวณช่วงสัปดาห์...</p>
      </div>

      <form id="f">
        <label>ชื่อ - ชื่อเล่น</label>
        <select name="name" required>
          <option value="">— เลือกชื่อ —</option>
          <option>สุรเชษฐ์ (ตั้ม)</option>
          <option>บัญญัติ (แดง)</option>
          <option>รัชเศรษฐ์ (ยศ)</option>
          <option>ชนุดม (ดอน)</option>
          <option>ทรงชัย (ทรง)</option>
          <option>สุรุ่งรัตน์ (เก่ง)</option>
          <option>อติพร (โอ)</option>
          <option>เกสณี (เก๋)</option>
          <option>สมภพ (เอก)</option>
          <option>ฐิตภรณ์ (เบลล์)</option>
          <option>อุมาพร (นก)</option>
          <option>ณัฐพล (ท๊อด)</option>
          <option>กิตติพงษ์ (พี)</option>
          <option>ธนพร (พร)</option>
          <option>รายาวดี (เฟริน)</option>
          <option>บัญญัติ (บอย)</option>
          <option>ธีรพล (ต้อม)</option>
          <option>นริศ (เอ็กซ์)</option>
          <option>กิตติ (ตี๋)</option>
          <option>จารุวรรณ (จุ๋ม)</option>
          <option>ณัฏฐา (เมย์)</option>
          <option>วรินทร (ต่อ)</option>
          <option>กิตติศักดิ์ (ใหม่)</option>
          <option>ราชัย (ชัย)</option>
          <option>รัญชนา (จีน่า)</option>
          <option>อรวรา (ผักแพว)</option>
          <option>วรรณชัย (ดิว)</option>
          <option>ธนกฤษ (พิว)</option>
          <option>บุญฤทธิ์ (ใหม่)</option>
          <option>จิรายุทธ (ลีโอ)</option>
          <option>นนทชา (วิว)</option>
          <option>ยิ่งลักษณ์ (กุ้ง)</option>
          <option>พรชนัน (มาร์ค)</option>
          <option>ศราวุฒิ (บอล)</option>
          <option>นันทพงศ์ (โบ๊ท)</option>
          <option>ณัฐวุฒิ (เฟียส)</option>
          <option>กฤษดา (โจ)</option>
          <option>รณฤทธิ์ (เม่น)</option>
          <option>ธีรศักดิ์ (ต่าย)</option>
          <option>ณภัทร (ตัน)</option>
          <option>เอกพจน์ (เอก)</option>
        </select>

        <div class="grid">
          <div>
            <label>วันที่บันทึก</label>
            <select id="logDate" name="logDate" required></select>
            <input type="hidden" id="weekdayHidden" name="weekday" value="">
          </div>

          <div>
            <label>ช่วงเวลา การทำสมาธิ</label>
            <select name="session" required>
              <option value="">— เลือกช่วง —</option>
              <option>ครั้งที่ 1 / ตื่นนอน-เช้า</option>
              <option>ครั้งที่ 2 / ระหว่างวัน</option>
              <option>ครั้งที่ 3 / ก่อนนอน-ค่ำ</option>
            </select>
          </div>
        </div>

        <label>ระยะเวลาในการทำสมาธิ(แต่ละครั้ง)</label>
        <select name="duration" required>
          <option value="">— เลือกระยะเวลา —</option>
          <option>3-5 นาที</option>
          <option>10 นาที</option>
        </select>

        <button id="btn" type="submit">บันทึกข้อมูล</button>

        <a class="linkbtn" href="/status.html">
          <button type="button">ตรวจสอบสถานะการทำสมาธิ</button>
        </a>

        <div class="msg" id="msg"></div>
        <div class="small">หมายเหตุ: ตรวจสอบข้อมูลก่อนกดบันทึกข้อมูล</div>
      </form>
    </div>
  </div>

  <!-- ===== Success Popup ===== -->
  <div id="successOverlay" class="success-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="success-card">
      <button type="button" class="success-close" id="successClose" aria-label="ปิดหน้าต่าง">✕</button>

      <div class="success-content">
        <div class="success-icon" aria-hidden="true">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M20 7L10.5 16.5L4 10" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p id="successText" class="success-text">บันทึกข้อมูลเรียบร้อย</p>

        <!-- Status boxes (no time, only done/not done) -->
        <div id="afterSaveGrid" class="afterSaveGrid" hidden>
          <div class="sbox" id="boxS1">
            <div class="sboxTop"><span>ครั้งที่ 1</span><span class="sicon" id="iconS1">✕</span></div>
            <div class="sboxMark" id="markS1"></div>
          </div>

          <div class="sbox" id="boxS2">
            <div class="sboxTop"><span>ครั้งที่ 2</span><span class="sicon" id="iconS2">✕</span></div>
            <div class="sboxMark" id="markS2"></div>
          </div>

          <div class="sbox" id="boxS3">
            <div class="sboxTop"><span>ครั้งที่ 3</span><span class="sicon" id="iconS3">✕</span></div>
            <div class="sboxMark" id="markS3"></div>
          </div>

          <div class="sbox summary" id="boxSum">
            <div class="sboxTop"><span>สรุป</span></div>
            <div class="sboxSum" id="sumText">0/3</div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  // =========================
  // Week header (local)
  // =========================
  const weekHeaderEl = document.getElementById("weekHeader");
  function pad2(n){ return String(n).padStart(2,"0"); }
  function toISODateLocal(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function thaiDateLabelLocal(d){
    return d.toLocaleDateString("th-TH", { day:"numeric", month:"short", year:"2-digit" });
  }
  function mondayOfWeekLocal(d){
    const x = new Date(d);
    x.setHours(0,0,0,0);
    const day = x.getDay(); // Sun=0
    const diff = (day === 0) ? -6 : (1 - day);
    x.setDate(x.getDate() + diff);
    return x;
  }
  function sundayOfWeekFromMonday(mon){
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    sun.setHours(0,0,0,0);
    return sun;
  }
  (function showWeekHeader(){
    const now = new Date();
    const mon = mondayOfWeekLocal(now);
    const sun = sundayOfWeekFromMonday(mon);
    weekHeaderEl.textContent = `จันทร์ ${thaiDateLabelLocal(mon)} – อาทิตย์ ${thaiDateLabelLocal(sun)}`;
  })();

  // =========================
  // LogDate dropdown (Mon..Sun of this week) + no past/future select
  // =========================
  const logDateEl = document.getElementById("logDate");
  const weekdayHiddenEl = document.getElementById("weekdayHidden");
  const TH_DOW = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];

  function buildLogDateOptions7DaysNoPast(){
    const now = new Date();
    const todayISO = toISODateLocal(now);
    const monThis = mondayOfWeekLocal(now);

    const days = [];
    for (let i=0; i<7; i++){
      const d = new Date(monThis);
      d.setDate(monThis.getDate() + i);
      d.setHours(0,0,0,0);
      days.push(d);
    }

    logDateEl.innerHTML = "";
    for (const d of days){
      const iso = toISODateLocal(d);
      const dow = TH_DOW[d.getDay()];
      const base = `${dow} ${thaiDateLabelLocal(d)}`;
      const label = (iso === todayISO) ? `${base} (วันนี้)` : base;

      const opt = document.createElement("option");
      opt.value = iso;
      opt.textContent = label;
      opt.dataset.dow = dow;

      if (iso < todayISO){
        opt.disabled = true;
        opt.textContent = `${label} (ผ่านมาแล้ว)`;
      } else if (iso > todayISO){
        opt.disabled = true;
        opt.textContent = `${label} (ยังมาไม่ถึง)`;
      }

      logDateEl.appendChild(opt);
    }

    if ([...logDateEl.options].some(o => o.value === todayISO)){
      logDateEl.value = todayISO;
    } else {
      for (let i=0; i<logDateEl.options.length; i++){
        if (!logDateEl.options[i].disabled){
          logDateEl.selectedIndex = i;
          break;
        }
      }
    }

    weekdayHiddenEl.value = logDateEl.selectedOptions[0]?.dataset?.dow || "";
  }

  logDateEl.addEventListener("change", () => {
    weekdayHiddenEl.value = logDateEl.selectedOptions[0]?.dataset?.dow || "";
  });

  buildLogDateOptions7DaysNoPast();

  // =========================
  // Popup timings (saving instantly -> success 6s -> close -> 2s reload)
  // =========================
  const overlay = document.getElementById('successOverlay');
  const textEl  = document.getElementById('successText');
  const closeBtn = document.getElementById('successClose');

  const HOLD_SUCCESS_MS = 6000;
  const RELOAD_AFTER_CLOSE_MS = 2000;

  let overlayTimer = null;
  let reloadTimer = null;

  function clearTimers(){
    if (overlayTimer){ clearTimeout(overlayTimer); overlayTimer = null; }
    if (reloadTimer){ clearTimeout(reloadTimer); reloadTimer = null; }
  }
  function openOverlay(){
    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden', 'false');
  }
  function closeOverlay(){
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
  }

  function showAfterSaveGrid(){
    const grid = document.getElementById("afterSaveGrid");
    if (grid) grid.hidden = false;
  }
  function hideAfterSaveGrid(){
    const grid = document.getElementById("afterSaveGrid");
    if (grid) grid.hidden = true;
  }

  function showSavingPopup(){
    clearTimers();
    hideAfterSaveGrid();
    textEl.textContent = "กำลังบันทึกข้อมูล...";
    openOverlay();
  }

  function showSuccessPopup(){
    clearTimers();
    textEl.textContent = "บันทึกข้อมูลเรียบร้อย";
    showAfterSaveGrid();
    openOverlay();

    overlayTimer = setTimeout(() => {
      closeOverlay();
      reloadTimer = setTimeout(() => location.reload(), RELOAD_AFTER_CLOSE_MS);
    }, HOLD_SUCCESS_MS);
  }

  function showErrorPopup(message){
    clearTimers();
    hideAfterSaveGrid();
    textEl.textContent = message || "บันทึกไม่สำเร็จ";
    openOverlay();
  }

  closeBtn.addEventListener('click', () => {
    clearTimers();
    closeOverlay();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      clearTimers();
      closeOverlay();
    }
  });

  // =========================
  // After-save marks (no time)
  // =========================
  function markSVG(done){
    if (done){
      return `<span class="mark ok" aria-label="ทำแล้ว">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 7L10.5 16.5L4 10" stroke="#b9ffd5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    }
    return `<span class="mark no" aria-label="ยังไม่ทำ">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" stroke="#ffd1d1" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </span>`;
  }

  function renderAfterSaveBoxes(st){
    const setBox = (key, done) => {
      const box  = document.getElementById("box" + key.toUpperCase());
      const icon = document.getElementById("icon" + key.toUpperCase());
      const slot = document.getElementById("mark" + key.toUpperCase());
      if (!box || !icon || !slot) return;

      box.classList.remove("ok","no");
      box.classList.add(done ? "ok" : "no");

      icon.textContent = done ? "✓" : "✕";
      slot.innerHTML = markSVG(done);
    };

    setBox("s1", !!st.sessions.s1.done);
    setBox("s2", !!st.sessions.s2.done);
    setBox("s3", !!st.sessions.s3.done);

    const sumEl = document.getElementById("sumText");
    if (sumEl) sumEl.textContent = `${st.doneCount}/3`;
  }

  function normalizeStatusPayload(raw){
    const empty = { doneCount:0, sessions:{ s1:{done:false}, s2:{done:false}, s3:{done:false} } };
    if (!raw) return empty;

    // {doneCount, sessions:{s1:{done}}}
    if (raw.sessions && raw.sessions.s1 && typeof raw.sessions.s1 === "object" && ("done" in raw.sessions.s1)){
      const s = raw.sessions;
      const dc = (raw.doneCount != null) ? raw.doneCount : [s.s1.done,s.s2.done,s.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions:{ s1:{done:!!s.s1.done}, s2:{done:!!s.s2.done}, s3:{done:!!s.s3.done} } };
    }

    // checkStatus: sessions:{s1:{mark:"✅"}}
    if (raw.sessions && raw.sessions.s1 && typeof raw.sessions.s1 === "object" && ("mark" in raw.sessions.s1)){
      const s = raw.sessions;
      const toDone = (x)=> String((x && x.mark) || "") === "✅";
      const ss = { s1:{done:toDone(s.s1)}, s2:{done:toDone(s.s2)}, s3:{done:toDone(s.s3)} };
      const dc = (raw.doneCount != null) ? raw.doneCount : [ss.s1.done,ss.s2.done,ss.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions: ss };
    }

    // legacy: sessions:{s1:"✅"}
    if (raw.sessions && typeof raw.sessions.s1 === "string"){
      const toDone = (v)=> String(v||"") === "✅";
      const ss = { s1:{done:toDone(raw.sessions.s1)}, s2:{done:toDone(raw.sessions.s2)}, s3:{done:toDone(raw.sessions.s3)} };
      const dc = (raw.doneCount != null) ? raw.doneCount : [ss.s1.done,ss.s2.done,ss.s3.done].filter(Boolean).length;
      return { doneCount: dc, sessions: ss };
    }

    return empty;
  }

  async function fetchCheckStatus(name, logDate){
    const url = `/api/checkStatus?name=${encodeURIComponent(name)}&logDate=${encodeURIComponent(logDate)}`;
    const res = await fetch(url, { cache:"no-store" });
    const out = await res.json().catch(()=>({}));
    if (!res.ok || !out.ok) throw new Error(out.error || "checkStatus_failed");
    return normalizeStatusPayload(out);
  }

  // =========================
  // SUBMIT
  // =========================
  const form = document.getElementById("f");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();

    btn.disabled = true;
    msg.className = "msg";
    msg.textContent = "กำลังบันทึกข้อมูล...";

    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());

    payload.clientNow = new Date().toISOString();
    payload.tzOffsetMin = new Date().getTimezoneOffset();

    // ✅ โชว์ “กำลังบันทึก…” ทันที (รู้สึกเร็ว)
    showSavingPopup();

    try {
      const res = await fetch("/api/submit", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });

      const out = await res.json().catch(() => ({}));

      if (res.ok && out.ok) {
        msg.className = "msg ok";
        msg.textContent = "บันทึกข้อมูลเรียบร้อย ✅";

        // ✅ เอาสถานะจาก submit ก่อน (ถ้ามี) ไม่มีก็ค่อย checkStatus
        let st;
        try{
          if (out && out.status) st = normalizeStatusPayload(out.status);
          else st = await fetchCheckStatus(payload.name, payload.logDate);
        } catch(e){
          st = { doneCount:0, sessions:{ s1:{done:false}, s2:{done:false}, s3:{done:false} } };
        }

        renderAfterSaveBoxes(st);

        // ✅ เปลี่ยน popup เป็น success และค้าง 6 วิ → ปิด → 2 วิ reload
        showSuccessPopup();

        // reset form + rebuild options (reload จะทำอยู่แล้ว แต่ทำไว้ให้พร้อม)
        form.reset();
        buildLogDateOptions7DaysNoPast();

      } else {
        msg.className = "msg bad";
        msg.textContent = "บันทึกไม่สำเร็จ ❌ " + (out.error || "unknown_error");
        showErrorPopup("บันทึกไม่สำเร็จ ❌ " + (out.error || "unknown_error"));
      }
    } catch (e) {
      msg.className = "msg bad";
      msg.textContent = "บันทึกไม่สำเร็จ ❌ " + e;
      showErrorPopup("บันทึกไม่สำเร็จ ❌ " + e);
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
